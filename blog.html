<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog – Vishal Gautam</title>
  <meta name="description" content="Thoughts, learnings, and experiences from Vishal Gautam – Software Engineer and Competitive Programmer." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta property="og:title" content="Blog – Vishal Gautam" />
  <meta property="og:description" content="Thoughts, learnings, and experiences from Vishal Gautam – Software Engineer and Competitive Programmer." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface-2: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,0.25);
      --text: #e8e8f0;
      --muted: #8888a0;
      --tag-bg: rgba(108,99,255,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    /* ── HERO ── */
    .hero {
      padding: 5rem 2rem 3.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--tag-bg);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── SEARCH / FILTER ── */
    .controls {
      max-width: 820px;
      margin: 0 auto 2.5rem;
      padding: 0 2rem;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }

    .search-bar:focus-within { border-color: var(--accent); }

    .search-bar svg { color: var(--muted); flex-shrink: 0; }

    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      width: 100%;
    }

    .search-bar input::placeholder { color: var(--muted); }

    .tag-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .tag-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.3rem 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag-btn:hover, .tag-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── POSTS GRID ── */
    .posts-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .posts-count {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .posts-list { display: flex; flex-direction: column; gap: 1.25rem; }

    /* ── CARD ── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .post-card:hover {
      transform: translateY(-3px);
      border-color: rgba(108,99,255,0.4);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(108,99,255,0.15);
    }

    .post-card:hover::before { opacity: 1; }

    .post-card-inner { position: relative; z-index: 1; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
    }

    .post-date {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }

    .dot {
      width: 3px;
      height: 3px;
      background: var(--muted);
      border-radius: 50%;
    }

    .read-time {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .post-tag {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--tag-bg);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    .post-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.3;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    .post-excerpt {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.25rem;
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      transition: gap 0.2s;
    }

    .post-card:hover .read-more { gap: 0.65rem; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state svg { margin-bottom: 1rem; opacity: 0.4; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer a { color: var(--accent); text-decoration: none; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero { animation: fadeUp 0.5s ease both; }
    .controls { animation: fadeUp 0.5s 0.1s ease both; }
    .post-card { animation: fadeUp 0.4s ease both; }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .hero { padding: 3.5rem 1rem 2.5rem; }
      .controls, .posts-container { padding-left: 1rem; padding-right: 1rem; }
      .post-card { padding: 1.25rem; }
      .post-title { font-size: 1.1rem; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="/"><span>V</span>ishal Gautam</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/blog" class="active">Blog</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <span class="hero-eyebrow">Writing</span>
    <h1>Blog</h1>
    <p>Thoughts on programming, competitive coding, startups, and life as a developer.</p>
  </section>

  <!-- SEARCH + FILTERS -->
  <div class="controls">
    <div class="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search posts…" autocomplete="off" />
    </div>
    <div class="tag-filters">
      <button class="tag-btn active" data-tag="all">All</button>
      <button class="tag-btn" data-tag="Web Dev">Web Dev</button>
      <button class="tag-btn" data-tag="CP">Competitive Programming</button>
      <button class="tag-btn" data-tag="Personal">Personal</button>
    </div>
  </div>

  <!-- POSTS -->
  <main class="posts-container">
    <p class="posts-count" id="posts-count">4 posts</p>
    <div class="posts-list" id="posts-list"></div>
    <div class="empty-state" id="empty-state" style="display:none;">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <h3>No posts found</h3>
      <p>Try a different search or filter.</p>
    </div>
  </main>

  <footer>
    <p>© 2024 Vishal Gautam · <a href="/">Back to Home</a></p>
  </footer>

  <script>
    const posts = [
      {
        slug: "3-months-of-web-dev",
        title: "3 Months of Web Development",
        date: "Feb 2, 2021",
        readTime: "3 min read",
        excerpt: "What I've learned in 3 months diving into the web development ecosystem — from React and Next.js to Tailwind CSS and Firebase.",
        tag: "Web Dev"
      }
    ];

    let activeTag = "all";

    function renderPosts(filtered) {
      const list = document.getElementById("posts-list");
      const empty = document.getElementById("empty-state");
      const count = document.getElementById("posts-count");

      list.innerHTML = "";

      if (filtered.length === 0) {
        empty.style.display = "block";
        count.textContent = "0 posts";
        return;
      }

      empty.style.display = "none";
      count.textContent = `${filtered.length} post${filtered.length !== 1 ? "s" : ""}`;

      filtered.forEach((post, i) => {
        const card = document.createElement("a");
        card.href = `/blog/${post.slug}.html`;
        card.className = "post-card";
        card.style.animationDelay = `${i * 0.07}s`;
        card.innerHTML = `
          <div class="post-card-inner">
            <div class="post-meta">
              <span class="post-date">${post.date}</span>
              <span class="dot"></span>
              <span class="read-time">${post.readTime}</span>
              <span class="post-tag">${post.tag}</span>
            </div>
            <h2 class="post-title">${post.title}</h2>
            <p class="post-excerpt">${post.excerpt}</p>
            <div class="post-footer">
              <span class="read-more">
                Read post
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </span>
            </div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function filter() {
      const query = document.getElementById("search-input").value.toLowerCase();
      const filtered = posts.filter(p => {
        const matchTag = activeTag === "all" || p.tag === activeTag;
        const matchSearch = p.title.toLowerCase().includes(query) || p.excerpt.toLowerCase().includes(query);
        return matchTag && matchSearch;
      });
      renderPosts(filtered);
    }

    document.getElementById("search-input").addEventListener("input", filter);

    document.querySelectorAll(".tag-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeTag = btn.dataset.tag;
        filter();
      });
    });

    renderPosts(posts);
  </script>

</body>
</html>
